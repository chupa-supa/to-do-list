<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=EB+Garamond&display=swap" rel="stylesheet">
    <title>To Do List</title>
</head>

<body>
    <header>
        <h1 class="title">My to do list</h1>
        <nav>
            <ul class="menu">
                <li>today</li>
                <li>week</li>
                <li>month</li>
                <li>profile</li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Today's list</h2>

        <input 
        class="new_item"
        placeholder="new item"
        type="text"
        >
        <button class="add_item" aria-label="Add item to list">Add Item</button>

        <ul class="today_list"></ul>
        <p class="error">Please enter a task</p>
    </main>





    <script src="script.js"></script>
</body>







</html>
